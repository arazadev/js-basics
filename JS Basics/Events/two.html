<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JS Basics With Me</h1>
    <button id="stop" >Stop</button>
</body>

<script>

    const sayAli = () => {  
        console.log("hitesh")
    }

    setTimeout(sayAli, 3000)
    
    const changeTxt = function(){
        document.querySelector('h1').innerHTML = "Starting Projects"
    }

    const changeMe = setTimeout(changeTxt, 3000);

    document.querySelector("#stop").addEventListener('click', function(){
        clearTimeout(changeMe)
        console.log("STOOPED")
    })
    
</script>

</html>
