<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body style="color: white; background-color: black">
    <ul>
      <li>UNSENT Client has been created. open() not called yet.</li>
      <li>OPENED open() has been called.</li>
      <li>
        HEADERS_RECEIVED send() has been called, and headers and status are
        available.
      </li>
      <li>LOADING Downloading; responseText holds partial data.</li>
      <li>DONE The operation is complete.</li>
    </ul>
  </body>
  <script>
    const reqURL = 'https://api.github.com/users/hiteshchoudhary'

    const xhr = new XMLHttpRequest()
    xhr.open('GET', reqURL)

    xhr.onreadystatechange = function () {
        console.log(xhr.readyState)
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText) //becasue this.responseText gives string
            console.log(typeof data)
            console.log(data.followers)
        }
    }

    // console.log(xhr.readyState)
    xhr.send()
    // console.log(xhr.readyState)
  </script>
</html>
